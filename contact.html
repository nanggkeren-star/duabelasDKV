<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DKV 2025 | Contact</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <header class="navbar fade-in">
    <div class="logo">
      <a href="index.html">
        <img src="Logo/Logo DKV new-01.png" alt="Logo DKV 2025" />
      </a>
    </div>

      <div class="menu-toggle" id="mobile-menu">
    <span class="bar"></span>
    <span class="bar"></span>
    <span class="bar"></span>
  </div>

    <nav id="navMenu">
      <a href="index.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="members.html">Members</a>
      <a href="gallery.html">Gallery</a>
      <a href="contact.html" class="active">Contact</a>

      <div id="themeToggle" class="theme-switch">
        <div class="switch-icon"></div>
      </div>
    </nav>
  </header>

  <main class="contact-container fade-in">

    <div class="contact-form">
      <h2>Hubungi Kami</h2>
      <p>Anda dapat menghubungi kami kapan saja</p>

      <form id="contactForm">
        <div class="input-group">
          <input type="text" placeholder="First name" required>
          <input type="text" placeholder="Last name" required>
        </div>

        <input type="tel" placeholder="📞 Phone number" required>
        <input type="email" placeholder="Email" required>
        <textarea placeholder="How can we help?" maxlength="250" required></textarea>

        <button type="submit" class="submit-btn">Submit</button>
      </form>

      <p class="terms">
        Dengan menghubungi kami, Anda menyetujui 
        <a href="#">Ketentuan layanan</a> dan 
        <a href="#">Kebijakan privasi</a>.
      </p>
    </div>

    <div class="contact-image">
      <img src="Gambar/DKV1.jpg" alt="Contact illustration">
    </div>

  </main>

  <footer>
    <p>© DKV Angkatan 2025 – Kreativitas Tanpa Batas</p>
  </footer>

  <script src="script.js"></script>

</body>
</html>
